name: Runtime Build

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Build Runtime
      run: dotnet publish Astrolune.Core.csproj -c Release -r win-x64 --self-contained -o ./dist/win-x64

    - name: Upload Windows Runtime
      uses: actions/upload-artifact@v4
      with:
        name: runtime-windows
        path: ./dist/win-x64

  build-linux:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Build Runtime
      run: dotnet publish Astrolune.Core.csproj -c Release -r linux-x64 --self-contained -o ./dist/linux-x64

    - name: Upload Linux Runtime
      uses: actions/upload-artifact@v4
      with:
        name: runtime-linux
        path: ./dist/linux-x64

  build-macos:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Build Runtime (x64)
      run: dotnet publish Astrolune.Core.csproj -c Release -r osx-x64 --self-contained -o ./dist/osx-x64

    - name: Build Runtime (arm64)
      run: dotnet publish Astrolune.Core.csproj -c Release -r osx-arm64 --self-contained -o ./dist/osx-arm64

    - name: Upload macOS Runtime
      uses: actions/upload-artifact@v4
      with:
        name: runtime-macos
        path: ./dist/osx-*

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          runtime-windows/**/*
          runtime-linux/**/*
          runtime-macos/**/*
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
